<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Суши Меню</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>🍣 TEST MENU 123</h1>
    </div>

    <!-- Основное меню -->
    <div class="menu">
        <div class="item">
            <h3>Филадельфия</h3>
            <p>Лосось, сыр, огурец</p>
            <p><b>45 SAR</b></p>
            <button class="add-btn" onclick="addToCart('Филадельфия', 45)">Добавить</button>
        </div>
        <div class="item">
            <h3>Калифорния</h3>
            <p>Краб, авокадо, тобико</p>
            <p><b>40 SAR</b></p>
            <button class="add-btn" onclick="addToCart('Калифорния', 40)">Добавить</button>
        </div>
        <div class="item">
            <h3>Дракон</h3>
            <p>Угорь, сыр, унаги соус</p>
            <p><b>55 SAR</b></p>
            <button class="add-btn" onclick="addToCart('Дракон', 55)">Добавить</button>
        </div>
    </div>

    <!-- 🛒 ПЛАВАЮЩАЯ ПАНЕЛЬ КОРЗИНЫ (появляется, когда есть товары) -->
    <div id="cart-bar" class="cart-bar" onclick="openCart()">
        <div class="cart-bar-info">
            <span id="cart-count">0</span> товаров
        </div>
        <div class="cart-bar-total">
            Сумма: <span id="cart-bar-sum">0</span> SAR
        </div>
    </div>

    <!-- 📦 МОДАЛЬНОЕ ОКНО КОРЗИНЫ -->
    <div id="cart-modal" class="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>Ваш заказ</h2>
                <button class="close-modal" onclick="closeCart()">✕</button>
            </div>

            <!-- Список выбранных роллов -->
            <div id="cart-items-list" class="cart-items-list">
                <!-- Сюда JS будет добавлять строки -->
            </div>

            <div class="cart-summary">
                <b>Итого: <span id="modal-total-sum">0</span> SAR</b>
            </div>

            <hr>

            <!-- Блок оформления (перенесен из основного экрана) -->
            <div class="checkout-section">
                <h3>📍 Куда доставить?</h3>
                <button id="location-btn" onclick="requestLocation()">📍 Определить местоположение</button>
                <p id="location-status">Адрес не выбран</p>
                
                <h3>💳 Способ оплаты:</h3>
                <div class="payment-options">
                    <label>
                        <input type="radio" name="payment" value="cash" checked> 💵 Наличными курьеру
                    </label>
                    <label>
                        <input type="radio" name="payment" value="online"> 💳 Онлайн (в боте)
                    </label>
                </div>
            </div>

            <button class="send-order-btn" onclick="sendOrder()">🚀 Оформить заказ</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
