<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sushi App</title>
    <link rel="stylesheet" href="style.css?v=5">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="menu-container" class="menu-grid"></div>

    <div id="cart-bar" onclick="openCart()">
        <div>
            <span id="cart-count">0</span> товаров | <span id="cart-bar-sum">0</span> SAR
        </div>
        <button class="cart-btn">В корзину</button>
    </div>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeCart()">✕</span>
            <h2>Оформление заказа</h2>
            
            <div id="cart-items-list"></div>
            <h3>Итого: <span id="modal-total-sum">0</span> SAR</h3>

            <hr>
            <h3>📍 Куда везти?</h3>
            <button onclick="requestLocation()" class="geo-btn">Определить мой адрес</button>
            <p id="location-status">Локация не определена</p>

            <hr>
            <h3>💳 Способ оплаты</h3>
            <label class="payment-label">
                <input type="radio" name="payment" value="cash" checked> Наличными курьеру
            </label><br>
            <label class="payment-label">
                <input type="radio" name="payment" value="online"> Картой онлайн
            </label>

            <button class="send-order-btn" onclick="sendOrder()">🚀 Подтвердить заказ</button>
        </div>
    </div>

    <script src="app.js?v=5"></script>
</body>
</html>
